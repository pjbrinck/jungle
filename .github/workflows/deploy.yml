name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy static site to EC2 on push to main
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} '
            set -e
            cd ~/jungleio
            echo "Pulling latest changes..."
            git pull origin main
            echo "Copying files to Nginx web root..."
            sudo cp -r . /var/www/jungleio/
            sudo chown -R www-data:www-data /var/www/jungleio/
            echo "Deployment complete!"
          '